<section class="cities">
  <div class="section-heading">
    <p class="section-heading__eyebrow">Trending cities</p>
    <h2>Europa comença a sentir-se real des de la primera pantalla.</h2>
  </div>

  <div class="cities__grid">
    @for (city of cities(); track city.name) {
      <article class="city-card">
        <div class="city-card__glow"></div>
        <p class="city-card__country">{{ city.country }}</p>
        <h3>{{ city.name }}</h3>
        <p>{{ city.vibe }}</p>
      </article>
    }
  </div>
</section>
