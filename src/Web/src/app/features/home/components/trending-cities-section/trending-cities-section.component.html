<section class="cities">
  <app-section-heading
    eyebrow="Ciutats destacades"
    title="Europa comença a sentir-se real des de la primera pantalla."
  />

  <div class="cities__grid">
    @for (city of cities(); track city.name) {
      <a class="city-card" [routerLink]="['/places']" [queryParams]="{ city: city.name }">
        <div class="city-card__glow"></div>
        <p class="city-card__country">{{ city.country }}</p>
        <h3>{{ city.name }}</h3>
        <p>{{ city.vibe }}</p>
      </a>
    }
  </div>
</section>
