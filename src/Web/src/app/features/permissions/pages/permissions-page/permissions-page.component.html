<app-site-header />

<main class="permissions-page">
  <section class="permissions-hero">
    <app-section-heading
      [eyebrow]="eyebrow"
      [title]="title"
    />
    <p class="permissions-hero__copy">{{ copy }}</p>
  </section>

  <section class="permissions-grid">
    @for (section of sections; track section.title) {
      <app-generic-info-card [badge]="section.title" [body]="section.body" />
    }
  </section>
</main>

<app-site-footer />
