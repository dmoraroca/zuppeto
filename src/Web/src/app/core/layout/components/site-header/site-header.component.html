<header class="site-header">
  <div class="site-header__inner">
    <a class="site-header__brand" routerLink="/" aria-label="YepPet home">
      <img class="site-header__logo" src="/images/logo.png" alt="YepPet" />
    </a>

    <nav class="site-header__nav" aria-label="Primary navigation">
      <a
        class="site-header__nav-link"
        routerLink="/"
        routerLinkActive="site-header__nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Inici
      </a>
      <a
        class="site-header__nav-link"
        routerLink="/places"
        routerLinkActive="site-header__nav-link--active"
      >
        Llocs
      </a>
      <a
        class="site-header__nav-link"
        routerLink="/favorites"
        routerLinkActive="site-header__nav-link--active"
      >
        Favorits
      </a>
      @if (isAuthenticated()) {
        <a
          class="site-header__nav-link"
          routerLink="/perfil"
          routerLinkActive="site-header__nav-link--active"
        >
          Perfil
        </a>
      } @else {
        <a
          class="site-header__nav-link"
          routerLink="/login"
          routerLinkActive="site-header__nav-link--active"
        >
          Login
        </a>
      }
      <details class="site-header__dropdown" #helpDropdown>
        <summary class="site-header__nav-link">
          Ajuda
          <span class="site-header__caret" aria-hidden="true"></span>
        </summary>
        <div class="site-header__dropdown-menu">
          <a
            class="site-header__dropdown-item"
            routerLink="/"
            fragment="why-yeppet"
            (click)="closeHelpDropdown()"
          >
            <span class="site-header__dropdown-title">Com funciona</span>
            <span class="site-header__dropdown-copy">
              Entén la proposta de valor i la lògica de la home.
            </span>
          </a>
          <a class="site-header__dropdown-item" routerLink="/contacte" (click)="closeHelpDropdown()">
            <span class="site-header__dropdown-title">Contacta'ns</span>
            <span class="site-header__dropdown-copy">
              Punt de contacte simulat per feedback, partnerships i noves ciutats.
            </span>
          </a>
        </div>
      </details>
      @if (isAuthenticated()) {
        <div class="site-header__session">
          <span class="site-header__session-role">{{ currentUser()?.role }}</span>
          <button type="button" class="site-header__session-logout" (click)="logout()">
            Sortir
          </button>
        </div>
      }
    </nav>
  </div>
</header>
